<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 560" width="600" height="560" role="img" aria-label="Infohazard — the watching eye">
  <title>Infohazard</title>
  <desc>The Last Psyop warning sign: a yellow hazard triangle with a watching eye and the info "i" in its pupil.</desc>
  <defs>
    <clipPath id="eyeClip"><path d="M 215 355 Q 300 281 385 355 Q 300 429 215 355 Z"/></clipPath>
  </defs>
  <!-- yellow warning triangle, black outline -->
  <polygon points="300,46 542,498 58,498" fill="#f2dd00" stroke="#0c0c0c" stroke-width="14" stroke-linejoin="round"/>
  <!-- the watching eye, scaled 137% about its centre, with the info "i" in the pupil -->
  <g transform="translate(300 355) scale(1.36) translate(-300 -355)">
    <g clip-path="url(#eyeClip)">
      <ellipse cx="300" cy="355" rx="120" ry="68" fill="#f2dd00"/>
      <circle cx="300" cy="355" r="46" fill="#f2dd00" stroke="#0c0c0c" stroke-width="6"/>
      <circle cx="300" cy="355" r="27" fill="#040403"/>
      <!-- info "i" (iris colour, as it shows through the pupil) -->
      <circle cx="300" cy="341.1" r="5.85" fill="#f2dd00"/>
      <rect x="294.5" y="349.7" width="11" height="24.1" rx="5.5" fill="#f2dd00"/>
    </g>
    <path d="M 215 355 Q 300 281 385 355 Q 300 429 215 355 Z" fill="none" stroke="#0c0c0c" stroke-width="7"/>
  </g>
</svg>
